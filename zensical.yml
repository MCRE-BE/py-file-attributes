site_name: py-file-attributes

theme:
  name: "material"
  palette:
    accent: indigo
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

repo_url: https://github.com/MCRE-BE/py-file-attributes
repo_name: MCRE-BE/py-file-attributes

copyright: Copyright &copy; 2026 Mathias Creemers

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MCRE-BE/py-file-attributes

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            show_submodules: true

nav:
  - welcome: index.md
  - installation: installation.md
  - usage: usage.md
  - limitation: limitation.md
  - API: references.md
